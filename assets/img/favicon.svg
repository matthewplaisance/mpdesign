<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" width="64" height="64">
	<!-- MP DESIGN — black, turns white in dark mode -->
	<style>
		text { fill: #000; }
		@media (prefers-color-scheme: dark) {
			text { fill: #fff; }
		}
	</style>
	<text x="32" y="36" text-anchor="middle" font-family="Roboto, Arial, sans-serif"
		font-size="30" font-weight="700" letter-spacing="-1">MP</text>
	<text x="32" y="52" text-anchor="middle" font-family="Roboto, Arial, sans-serif"
		font-size="10" font-weight="700" letter-spacing="1.5">DESIGN</text>
</svg>
